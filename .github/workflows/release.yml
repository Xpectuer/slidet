name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: slidet
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: package-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            archive_suffix: linux-musl-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            archive_suffix: macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-manual}"
          package_dir="${BINARY_NAME}-${version}-${{ matrix.archive_suffix }}"
          mkdir -p "dist/${package_dir}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${package_dir}/"
          cp README.md "dist/${package_dir}/"
          tar -C dist -czf "dist/${package_dir}.tar.gz" "${package_dir}"
          (
            cd dist
            shasum -a 256 "${package_dir}.tar.gz" > "${package_dir}.tar.gz.sha256"
          )

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
